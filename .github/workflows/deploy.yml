name: Deploy SuicaoDex

on:
  push:
    branches:
      - main

  workflow_dispatch:

concurrency:
  group: deploy-suicaodex
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.VPS_PORT }}" -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        env:
          VPS_DEPLOY_COMMAND: ${{ secrets.VPS_DEPLOY_COMMAND }}
        run: |
          ssh -i ~/.ssh/deploy_key \
            -p "${{ secrets.VPS_PORT }}" \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "$VPS_DEPLOY_COMMAND"
